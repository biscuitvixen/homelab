services:
  # samba:
  #   extends:
  #     file: ./services/samba.yml
  #     service: samba
  #   profiles: ["serv"]
  #   user: "1001:3001"

  tailscale:
    extends:
      file: ./services/tailscale.yml
      service: tailscale
    profiles: ["serv", "pi"]

  unbound:
    extends:
      file: ./services/unbound.yml
      service: unbound
    profiles: ["serv", "pi", "dns"]
    networks:
      - homelab_network

  adguard:
    extends:
      file: ./services/adguard.yml
      service: adguard
    depends_on:
      unbound:
        condition: service_healthy
    profiles: ["serv", "dns"]
    networks:
      - homelab_network

  caddy:
    extends:
      file: ./services/caddy.yml
      service: caddy
    profiles: ["serv", "dns"]
    networks:
      - homelab_network

  homeassistant:
    extends:
      file: ./services/homeassistant.yml
      service: homeassistant
    profiles: ["serv", "iot"]

  mosquitto:
    extends:
      file: ./services/mosquitto.yml
      service: mosquitto
    profiles: ["serv", "iot"]

#  matter-server:
#    extends:
#      file: ./services/matter.yml
#      service: matter-server
#    profiles: ["serv", "iot"]

  atuin:
    extends:
      file: ./services/atuin.yml
      service: atuin
    profiles: ["serv"]
    networks:
      - homelab_network

  vaultwarden:
    extends:
      file: ./services/vaultwarden.yml
      service: vaultwarden
    profiles: ["serv"]
    networks:
      - homelab_network

  mealie:
    extends:
      file: ./services/mealie.yml
      service: mealie
    profiles: ["serv"]
    networks:
      - homelab_network

  watchtower:
    extends:
      file: ./services/watchtower.yml
      service: watchtower
    profiles: ["serv", "pi"]

  scarlett-lavalink:
    extends:
      file: ./services/scarlett.yml
      service: scarlett-lavalink
    profiles: ["serv", "ai"]
    networks:
      - homelab_network

  scarlett-bot:
    extends:
      file: ./services/scarlett.yml
      service: scarlett-bot
    depends_on:
      scarlett-lavalink:
        condition: service_healthy
    profiles: ["serv", "ai"]
    networks:
      - homelab_network

  # portainer:
  #   extends:
  #     file: ./services/portainer.yml
  #     service: portainer
  #   # profiles: ["serv"]
  #   networks:
  #     - homelab_network

# Shared network for service communication
networks:
  homelab_network:
    driver: bridge
    name: homelab_network

volumes:
  # Cached Lavalink plugin jars for Scarlett (chown to uid 322 once, see scarlett.md)
  scarlett_lavalink_plugins:
