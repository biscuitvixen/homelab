<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Homelab</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
    <!-- Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  </head>
  <body>
    <div id="app" class="container">
      <header>
        <div class="header-text">
          <h1>Homelab Dashboard</h1>
          <p class="desc">✨ Quick access to your local services</p>
        </div>
        <button @click="downloadCertificate" class="cert-button">
          🔒 Download Certificate
        </button>
      </header>

      <section class="grid">
        <a v-for="link in links" :key="link.href" class="card" :href="link.href" target="_blank">
          <div class="row">
            <h3>{{ link.name }}</h3>
            <span class="right">{{ link.host }}</span>
          </div>
          <div class="muted">{{ link.subtitle }}</div>
        </a>
      </section>

      <section class="table-section">
        <h2 class="table-heading">All Services</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Service</th>
                <th>Address</th>
                <th>Port(s)</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="svc in tableRows" :key="svc.name">
                <td>{{ svc.name }}</td>
                <td class="mono">{{ svc.address }}</td>
                <td class="mono">{{ svc.ports }}</td>
                <td class="muted">{{ svc.notes }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <footer>🔒 Secured by Caddy with internal TLS 🚀</footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
